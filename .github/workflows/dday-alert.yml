name: 입시 D-day 알림

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 00:00 UTC = 한국시간 아침 9시
  workflow_dispatch:       # 수동 실행 버튼 (테스트용)

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
      - name: 텔레그램 D-day 메시지 발송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PYEOF'
          import datetime, os, json, urllib.request, urllib.parse

          KST = datetime.timezone(datetime.timedelta(hours=9))
          today = datetime.datetime.now(KST).date()

          # 2027학년도 대입 주요 일정 (출처: 교육부/대교협 확정 일정, 2026-07-03 조사 기준)
          EVENTS = [
              ("7월 학력평가",        "2026-07-08", ""),
              ("수능 원서접수 시작",   "2026-08-20", "~9/4, 재학생은 학교에서 일괄 접수"),
              ("9월 모의평가",        "2026-09-02", "수능 최종 리허설"),
              ("수시 원서접수 시작",   "2026-09-07", "9/7~9/11, 대학별 3일 이상"),
              ("10월 학력평가",       "2026-10-20", ""),
              ("수능",               "2026-11-19", ""),
              ("수능 성적통지",       "2026-12-11", ""),
              ("수시 합격발표 마감",   "2026-12-18", ""),
              ("수시 등록 시작",      "2026-12-21", "12/21~23"),
              ("수시 추가합격 마감",   "2026-12-31", ""),
              ("정시 원서접수 시작",   "2027-01-04", "1/4~1/7"),
              ("정시 합격발표 마감",   "2027-02-05", ""),
              ("정시 등록 시작",      "2027-02-10", "2/10~12"),
              ("추가모집 시작",       "2027-02-19", "2/19~26"),
          ]

          WD = ["월", "화", "수", "목", "금", "토", "일"]

          def parse(s):
              return datetime.date.fromisoformat(s)

          upcoming = [(n, parse(d), memo) for n, d, memo in EVENTS if parse(d) >= today]

          lines = []
          lines.append(f"📅 2027 대입 D-day ({today.month}/{today.day} {WD[today.weekday()]})")
          lines.append("")

          suneung = parse("2026-11-19")
          if suneung >= today:
              dd = (suneung - today).days
              if dd == 0:
                  lines.append("🎯 오늘은 수능일입니다! 최상의 컨디션으로!")
              else:
                  lines.append(f"🔥 수능 D-{dd}")
              lines.append("")

          todays = [(n, d, m) for n, d, m in upcoming if d == today and n != "수능"]
          for n, d, m in todays:
              lines.append(f"🎯 오늘: {n}" + (f" ({m})" if m else ""))
          if todays:
              lines.append("")

          shown = 0
          for n, d, m in upcoming:
              if d == today or n == "수능":
                  continue
              dd = (d - today).days
              memo = f" · {m}" if m else ""
              lines.append(f"▪️ {n} D-{dd} ({d.month}/{d.day} {WD[d.weekday()]}){memo}")
              shown += 1
              if shown >= 5:
                  break

          if not upcoming:
              lines.append("🎉 2027학년도 대입 일정이 모두 끝났습니다. 고생 많으셨어요!")
              lines.append("(이 알림은 저장소의 Actions 탭에서 워크플로를 비활성화하면 멈출 수 있어요.)")

          msg = "\n".join(lines)

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat = os.environ["TELEGRAM_CHAT_ID"]
          data = urllib.parse.urlencode({"chat_id": chat, "text": msg}).encode()
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage", data=data)
          with urllib.request.urlopen(req, timeout=30) as resp:
              result = json.load(resp)
          assert result.get("ok"), f"Telegram API error: {result}"
          print("발송 완료:", msg.replace("\n", " / "))
          PYEOF

      # GitHub은 60일간 저장소에 커밋이 없으면 예약 실행을 자동으로 끕니다.
      # 매월 1일에 작은 커밋을 남겨 알림이 입시 끝날 때까지 멈추지 않게 합니다.
      - name: 매월 1일 keepalive 커밋
        if: github.event_name == 'schedule'
        run: |
          if [ "$(TZ=Asia/Seoul date +%d)" = "01" ]; then
            git config user.name "dday-bot"
            git config user.email "actions@users.noreply.github.com"
            TZ=Asia/Seoul date > .keepalive
            git add .keepalive
            git commit -m "keepalive: 예약 실행 유지" || true
            git push || true
          fi
